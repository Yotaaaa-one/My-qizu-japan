<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>選手マスター管理 v17.0</title>
  <link rel="stylesheet" href="./platform-admin-v17.0.css">
</head>
<body class="platform-admin">
  <div class="adminShell">
    <aside class="adminSidebar">
      <div class="adminBrand">
        <strong>PGA Tournament Platform</strong>
        <span>v17.0 Phase 3-D</span>
      </div>
      <nav class="adminNav">
        <a href="./admin.html">管理トップ</a>
        <a class="active" href="./players_admin.html">選手マスター</a>
        <a href="./tournaments_admin.html">大会マスター</a>
        <a href="./entries_admin.html">出場者管理</a>
        <span class="disabledNav">スコア生成 <small>準備中</small></span>
      </nav>
    </aside>

    <main class="adminMain">
      <header class="adminTopbar">
        <div class="adminTitle">
          <h1>選手マスター管理</h1>
          <p>Firestore players/{playerId} を管理します。</p>
        </div>
        <div class="adminUser">
          <span data-auth-email>認証確認中</span>
          <span class="badge" data-auth-role>login</span>
          <button class="btn secondary" data-platform-logout>ログアウト</button>
        </div>
      </header>

      <section class="adminPanel">
        <div class="panelHeader">
          <h2>検索</h2>
          <button id="resetSearchBtn" class="btn secondary">条件クリア</button>
        </div>
        <div class="formGrid">
          <div class="field">
            <label for="searchName">氏名</label>
            <input id="searchName" type="search" placeholder="例：山田">
          </div>
          <div class="field">
            <label for="searchKana">フリガナ</label>
            <input id="searchKana" type="search" placeholder="例：ヤマダ">
          </div>
          <div class="field">
            <label for="searchAffiliation">所属</label>
            <input id="searchAffiliation" type="search" placeholder="例：PGA">
          </div>
          <div class="field">
            <label for="searchQualification">資格区分</label>
            <select id="searchQualification"></select>
          </div>
          <div class="field">
            <label for="searchStatus">ステータス</label>
            <select id="searchStatus"></select>
          </div>
          <div class="field">
            <label for="displayEligibilityYear">表示年度</label>
            <select id="displayEligibilityYear"></select>
          </div>
          <div class="field">
            <label for="searchRegistered">年間登録</label>
            <select id="searchRegistered">
              <option value="">すべて</option>
              <option value="true">有</option>
              <option value="false">無</option>
            </select>
          </div>
          <div class="field">
            <label for="searchSeed">シード資格</label>
            <select id="searchSeed">
              <option value="">すべて</option>
              <option value="true">有</option>
              <option value="false">無</option>
            </select>
          </div>
          <div class="field">
            <label for="searchQualifierRankMin">予選会ランキング</label>
            <div class="inlineFields">
              <input id="searchQualifierRankMin" type="number" min="1" placeholder="下限">
              <span>〜</span>
              <input id="searchQualifierRankMax" type="number" min="1" placeholder="上限">
            </div>
          </div>
        </div>
      </section>

      <section class="adminPanel">
        <div class="toolbar">
          <div>
            <strong id="playerCountLabel">0件</strong>
            <span class="smallText" id="playerUpdatedLabel">読込待ち</span>
          </div>
          <div class="buttonRow">
            <button id="newPlayerBtn" class="btn">新規登録</button>
            <button id="importCsvBtn" class="btn secondary">CSVインポート</button>
            <button id="exportCsvBtn" class="btn secondary">CSVエクスポート</button>
            <button id="reloadPlayersBtn" class="btn ghost">再読込</button>
            <input id="csvFileInput" class="hidden" type="file" accept=".csv,text/csv">
          </div>
        </div>
      </section>

      <section class="adminPanel">
        <div class="tableWrap">
          <table class="adminTable">
            <thead>
              <tr>
                <th><button type="button" class="sortHeader" data-sort-key="name">氏名 <span class="sortIndicator"></span></button></th>
                <th><button type="button" class="sortHeader" data-sort-key="kana">フリガナ <span class="sortIndicator"></span></button></th>
                <th><button type="button" class="sortHeader" data-sort-key="affiliation">所属 <span class="sortIndicator"></span></button></th>
                <th><button type="button" class="sortHeader" data-sort-key="qualification">資格区分 <span class="sortIndicator"></span></button></th>
                <th><button type="button" class="sortHeader" data-sort-key="registered">年間登録 <span class="sortIndicator"></span></button></th>
                <th><button type="button" class="sortHeader" data-sort-key="seed">シード資格 <span class="sortIndicator"></span></button></th>
                <th><button type="button" class="sortHeader" data-sort-key="qualifierRank">予選会ランキング <span class="sortIndicator"></span></button></th>
                <th>生年月日</th>
                <th>メール</th>
                <th>電話</th>
                <th><button type="button" class="sortHeader" data-sort-key="status">ステータス <span class="sortIndicator"></span></button></th>
                <th>更新日時</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="playersTableBody">
              <tr><td colspan="13" class="tableEmpty">ログイン後に読み込みます。</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="playerModal" class="modalBackdrop" aria-hidden="true">
    <div class="modalCard">
      <form id="playerForm">
        <div class="modalHeader">
          <h2 id="playerModalTitle">選手登録</h2>
          <p class="smallText">氏名は必須です。CSVの列名は英語・日本語のどちらにも対応します。</p>
        </div>
        <div class="modalBody">
          <div class="formGrid three">
            <div class="field">
              <label for="playerName">氏名</label>
              <input id="playerName" name="name" required>
            </div>
            <div class="field">
              <label for="playerKana">フリガナ</label>
              <input id="playerKana" name="kana">
            </div>
            <div class="field">
              <label for="playerAffiliation">所属</label>
              <input id="playerAffiliation" name="affiliation">
            </div>
            <div class="field">
              <label for="playerQualification">資格区分</label>
              <select id="playerQualification" name="qualification"></select>
            </div>
            <div class="field">
              <label for="playerQualificationYear">年度別資格 年度</label>
              <select id="playerQualificationYear" name="year"></select>
            </div>
            <div class="field">
              <label for="playerRegistered">年間登録</label>
              <select id="playerRegistered" name="registered">
                <option value="false">無</option>
                <option value="true">有</option>
              </select>
            </div>
            <div class="field">
              <label for="playerSeed">シード資格</label>
              <select id="playerSeed" name="seed">
                <option value="false">無</option>
                <option value="true">有</option>
              </select>
            </div>
            <div class="field">
              <label for="playerQualifierRank">予選会ランキング</label>
              <input id="playerQualifierRank" name="qualifierRank" type="number" min="1" placeholder="例: 12">
            </div>
            <div class="field">
              <label for="playerBirthDate">生年月日</label>
              <input id="playerBirthDate" name="birthDate" type="date">
            </div>
            <div class="field">
              <label for="playerStatus">ステータス</label>
              <select id="playerStatus" name="status"></select>
            </div>
            <div class="field">
              <label for="playerEmail">メールアドレス</label>
              <input id="playerEmail" name="email" type="email">
            </div>
            <div class="field">
              <label for="playerPhone">電話番号</label>
              <input id="playerPhone" name="phone" type="tel">
            </div>
          </div>
          <div id="playerFormError" class="formError"></div>
        </div>
        <div class="modalFooter">
          <button type="button" id="cancelPlayerBtn" class="btn secondary">キャンセル</button>
          <button type="submit" class="btn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="./platform-core-v17.0.js"></script>
  <script>
    const appState = {
      players: [],
      filtered: [],
      editingId: null,
      unsubscribe: null,
      sort: { key: 'kana', direction: 'asc' }
    };

    const $ = id => document.getElementById(id);

    function fillSelect(select, rows, includeAllLabel) {
      if (!select) return;
      const options = includeAllLabel ? [{ value: '', label: includeAllLabel }, ...rows] : rows;
      select.innerHTML = options.map(row => `<option value="${PGAPlatform.escapeHtml(row.value)}">${PGAPlatform.escapeHtml(row.label)}</option>`).join('');
    }

    function qualificationYears(player) {
      const current = new Date().getFullYear();
      const years = new Set(Array.from({ length: 7 }, (_, index) => String(current - 2 + index)));
      appState.players.forEach(item => {
        Object.keys(item.years || {}).forEach(year => years.add(String(year)));
        if (item.eligibilityYear) years.add(String(item.eligibilityYear));
      });
      Object.keys(player?.years || {}).forEach(year => years.add(String(year)));
      if (player?.eligibilityYear) years.add(String(player.eligibilityYear));
      return [...years].sort((left, right) => Number(right) - Number(left));
    }

    function fillYearSelect(select, selected) {
      if (!select) return;
      const years = qualificationYears();
      select.innerHTML = years.map(year => `<option value="${year}">${year}年度</option>`).join('');
      select.value = years.includes(String(selected)) ? String(selected) : (years[0] || '');
    }

    function displayYear() {
      return $('displayEligibilityYear')?.value || '';
    }

    function yearEligibility(player, year = displayYear()) {
      return PGAPlatform.getYearEligibility(player, year);
    }

    function collectFilters() {
      return {
        name: PGAPlatform.normalizeText($('searchName')?.value),
        kana: PGAPlatform.normalizeText($('searchKana')?.value),
        affiliation: PGAPlatform.normalizeText($('searchAffiliation')?.value),
        qualification: $('searchQualification')?.value || '',
        status: $('searchStatus')?.value || '',
        year: displayYear(),
        registered: $('searchRegistered')?.value || '',
        seed: $('searchSeed')?.value || '',
        qualifierRankMin: $('searchQualifierRankMin')?.value || '',
        qualifierRankMax: $('searchQualifierRankMax')?.value || ''
      };
    }

    function applyFilters() {
      const f = collectFilters();
      appState.filtered = appState.players.filter(player => {
        if (f.name && !PGAPlatform.normalizeText(player.name).includes(f.name)) return false;
        if (f.kana && !PGAPlatform.normalizeText(player.kana).includes(f.kana)) return false;
        if (f.affiliation && !PGAPlatform.normalizeText(player.affiliation).includes(f.affiliation)) return false;
        if (f.qualification && player.qualification !== f.qualification) return false;
        if (f.status && player.status !== f.status) return false;
        const eligibility = yearEligibility(player, f.year);
        if (f.registered === 'true' && !eligibility.registered) return false;
        if (f.registered === 'false' && eligibility.registered) return false;
        if (f.seed === 'true' && !eligibility.seed) return false;
        if (f.seed === 'false' && eligibility.seed) return false;
        const rank = Number(eligibility.qualifierRank || 0);
        if (f.qualifierRankMin && (!rank || rank < Number(f.qualifierRankMin))) return false;
        if (f.qualifierRankMax && (!rank || rank > Number(f.qualifierRankMax))) return false;
        return true;
      });
      appState.filtered = sortPlayers(appState.filtered);
      renderPlayers();
    }

    function sortPlayers(players) {
      const { key, direction } = appState.sort;
      const multiplier = direction === 'asc' ? 1 : -1;
      const numericKeys = new Set(['qualifierRank']);
      const labels = {
        qualification: value => PGAPlatform.qualificationLabel(value),
        status: value => PGAPlatform.statusLabel(value),
        registered: value => value ? 1 : 0,
        seed: value => value ? 1 : 0
      };
      const valueFor = player => {
        const eligibility = yearEligibility(player);
        const values = {
          registered: eligibility.registered,
          seed: eligibility.seed,
          qualifierRank: eligibility.qualifierRank
        };
        const value = Object.prototype.hasOwnProperty.call(values, key) ? values[key] : player[key];
        return labels[key] ? labels[key](value) : value;
      };
      return [...players].sort((left, right) => {
        const leftValue = valueFor(left);
        const rightValue = valueFor(right);
        const leftEmpty = leftValue === '' || leftValue === null || leftValue === undefined;
        const rightEmpty = rightValue === '' || rightValue === null || rightValue === undefined;
        if (leftEmpty && rightEmpty) return String(left.kana || left.name || '').localeCompare(String(right.kana || right.name || ''), 'ja');
        if (leftEmpty) return 1;
        if (rightEmpty) return -1;
        const compared = numericKeys.has(key) || key === 'registered' || key === 'seed'
          ? Number(leftValue) - Number(rightValue)
          : String(leftValue).localeCompare(String(rightValue), 'ja');
        if (compared !== 0) return compared * multiplier;
        return String(left.kana || left.name || '').localeCompare(String(right.kana || right.name || ''), 'ja');
      });
    }

    function renderSortHeaders() {
      document.querySelectorAll('.sortHeader').forEach(button => {
        const active = button.dataset.sortKey === appState.sort.key;
        button.classList.toggle('active', active);
        button.setAttribute('aria-sort', active ? (appState.sort.direction === 'asc' ? 'ascending' : 'descending') : 'none');
        button.querySelector('.sortIndicator').textContent = active ? (appState.sort.direction === 'asc' ? '↑' : '↓') : '';
      });
    }

    function renderPlayers() {
      const body = $('playersTableBody');
      if (!body) return;
      $('playerCountLabel').textContent = `${appState.filtered.length}件 / 全${appState.players.length}件`;
      $('playerUpdatedLabel').textContent = `更新 ${new Date().toLocaleTimeString('ja-JP', { hour12: false })}`;
      renderSortHeaders();

      if (!appState.filtered.length) {
        body.innerHTML = '<tr><td colspan="13" class="tableEmpty">該当する選手がいません。</td></tr>';
        return;
      }

      body.innerHTML = appState.filtered.map(player => {
        const eligibility = yearEligibility(player);
        return `
        <tr>
          <td><strong>${PGAPlatform.escapeHtml(player.name || '')}</strong></td>
          <td>${PGAPlatform.escapeHtml(player.kana || '')}</td>
          <td>${PGAPlatform.escapeHtml(player.affiliation || '')}</td>
          <td>${PGAPlatform.escapeHtml(PGAPlatform.qualificationLabel(player.qualification))}</td>
          <td><span class="${eligibility.registered ? 'badge' : 'badge disabled'}">${eligibility.registered ? '有' : '無'}</span></td>
          <td><span class="${eligibility.seed ? 'badge' : 'badge disabled'}">${eligibility.seed ? '有' : '無'}</span></td>
          <td>${PGAPlatform.escapeHtml(eligibility.qualifierRank || '')}</td>
          <td>${PGAPlatform.escapeHtml(player.birthDate || '')}</td>
          <td>${PGAPlatform.escapeHtml(player.email || '')}</td>
          <td>${PGAPlatform.escapeHtml(player.phone || '')}</td>
          <td><span class="${PGAPlatform.badgeClassForStatus(player.status)}">${PGAPlatform.escapeHtml(PGAPlatform.statusLabel(player.status))}</span></td>
          <td>${PGAPlatform.escapeHtml(PGAPlatform.formatDateTime(player.updatedAt))}</td>
          <td><button class="btn secondary" data-edit-player="${player.id}">編集</button></td>
        </tr>
      `;
      }).join('');

      document.querySelectorAll('[data-edit-player]').forEach(btn => {
        btn.onclick = () => openPlayerModal(btn.dataset.editPlayer);
      });
    }

    function openPlayerModal(playerId) {
      appState.editingId = playerId || null;
      const player = appState.players.find(p => p.id === playerId) || {};
      $('playerModalTitle').textContent = playerId ? '選手編集' : '選手登録';
      $('playerName').value = player.name || '';
      $('playerKana').value = player.kana || '';
      $('playerAffiliation').value = player.affiliation || '';
      $('playerQualification').value = player.qualification || '';
      fillYearSelect($('playerQualificationYear'), displayYear() || player.eligibilityYear || '');
      loadPlayerYearEligibility(player);
      $('playerBirthDate').value = player.birthDate || '';
      $('playerEmail').value = player.email || '';
      $('playerPhone').value = player.phone || '';
      $('playerStatus').value = player.status || 'active';
      $('playerFormError').classList.remove('show');
      $('playerModal').classList.add('show');
      $('playerModal').setAttribute('aria-hidden', 'false');
      setTimeout(() => $('playerName')?.focus(), 0);
    }

    function closePlayerModal() {
      $('playerModal').classList.remove('show');
      $('playerModal').setAttribute('aria-hidden', 'true');
      appState.editingId = null;
    }

    function loadPlayerYearEligibility(player) {
      const eligibility = yearEligibility(player, $('playerQualificationYear').value);
      $('playerRegistered').value = eligibility.registered ? 'true' : 'false';
      $('playerSeed').value = eligibility.seed ? 'true' : 'false';
      $('playerQualifierRank').value = eligibility.qualifierRank || '';
      syncPlayerYearControls();
    }

    function syncPlayerYearControls() {
      const registered = $('playerRegistered').value === 'true';
      if (!registered) {
        $('playerSeed').value = 'false';
        $('playerQualifierRank').value = '';
      }
      $('playerSeed').disabled = !registered;
      $('playerQualifierRank').disabled = !registered;
    }

    function formDataToPlayer() {
      return {
        name: $('playerName').value.trim(),
        kana: $('playerKana').value.trim(),
        affiliation: $('playerAffiliation').value.trim(),
        qualification: $('playerQualification').value,
        birthDate: $('playerBirthDate').value,
        email: $('playerEmail').value.trim(),
        phone: $('playerPhone').value.trim(),
        status: $('playerStatus').value || 'active'
      };
    }

    function yearEligibilityFromForm() {
      const year = $('playerQualificationYear').value;
      const registered = $('playerRegistered').value === 'true';
      return {
        year,
        value: {
          registered,
          seed: registered && $('playerSeed').value === 'true',
          qualifierRank: registered && $('playerQualifierRank').value ? Number($('playerQualifierRank').value) : null,
          updatedAt: PGAPlatform.serverTimestamp()
        }
      };
    }

    async function savePlayer(event) {
      event.preventDefault();
      const data = formDataToPlayer();
      const annual = yearEligibilityFromForm();
      const errorBox = $('playerFormError');
      errorBox.classList.remove('show');
      if (!data.name) {
        errorBox.textContent = '氏名を入力してください。';
        errorBox.classList.add('show');
        return;
      }

      try {
        const collection = PGAPlatform.db().collection('players');
        data.years = annual.year ? { [annual.year]: annual.value } : {};
        if (appState.editingId) {
          await collection.doc(appState.editingId).set({
            ...data,
            updatedAt: PGAPlatform.serverTimestamp()
          }, { merge: true });
          PGAPlatform.showToast('選手情報を更新しました。');
        } else {
          await collection.add({
            ...data,
            createdAt: PGAPlatform.serverTimestamp(),
            updatedAt: PGAPlatform.serverTimestamp()
          });
          PGAPlatform.showToast('選手を登録しました。');
        }
        closePlayerModal();
      } catch (error) {
        errorBox.textContent = '保存できませんでした: ' + (error.message || error.code);
        errorBox.classList.add('show');
      }
    }

    function subscribePlayers() {
      if (appState.unsubscribe) appState.unsubscribe();
      appState.unsubscribe = PGAPlatform.db().collection('players').onSnapshot(snapshot => {
        appState.players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        fillYearSelect($('displayEligibilityYear'), displayYear());
        applyFilters();
      }, error => {
        console.error('[v17 players] snapshot error', error);
        $('playersTableBody').innerHTML = `<tr><td colspan="13" class="tableEmpty">読み込みエラー: ${PGAPlatform.escapeHtml(error.message || error.code)}</td></tr>`;
      });
    }

    function exportCsv() {
      const year = displayYear();
      const rows = appState.filtered.map(player => {
        const eligibility = yearEligibility(player, year);
        return {
        playerId: player.id,
        name: player.name || '',
        kana: player.kana || '',
        affiliation: player.affiliation || '',
        qualification: player.qualification || '',
        year,
        registered: eligibility.registered,
        seed: eligibility.seed,
        qualifierRank: eligibility.qualifierRank || '',
        birthDate: player.birthDate || '',
        email: player.email || '',
        phone: player.phone || '',
        status: player.status || '',
        createdAt: PGAPlatform.formatDateTime(player.createdAt),
        updatedAt: PGAPlatform.formatDateTime(player.updatedAt)
      };
      });
      const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      PGAPlatform.downloadText(`players_master_${stamp}.csv`, PGAPlatform.objectsToCsv(rows), 'text/csv;charset=utf-8');
      PGAPlatform.showToast('CSVを書き出しました。');
    }

    function safeDocId(raw) {
      return String(raw || '').trim().replace(/[\/#?[\]]/g, '_').slice(0, 120);
    }

    async function importCsv(file) {
      if (!file) return;
      try {
        const text = await PGAPlatform.readFileAsText(file);
        const records = PGAPlatform.csvToObjects(text).map(PGAPlatform.normalizePlayerRecord).filter(row => row.name);
        if (!records.length) {
          PGAPlatform.showToast('取り込める選手データがありません。');
          return;
        }

        const collection = PGAPlatform.db().collection('players');
        let batch = PGAPlatform.db().batch();
        let pending = 0;
        let imported = 0;

        const commit = async () => {
          if (!pending) return;
          await batch.commit();
          batch = PGAPlatform.db().batch();
          pending = 0;
        };

        for (const row of records) {
          const id = safeDocId(row.playerId);
          const ref = id ? collection.doc(id) : collection.doc();
          const exists = id ? await ref.get().then(snap => snap.exists).catch(() => false) : false;
          const data = {
            name: row.name,
            kana: row.kana,
            affiliation: row.affiliation,
            qualification: row.qualification,
            birthDate: row.birthDate,
            email: row.email,
            phone: row.phone,
            status: row.status || 'active',
            updatedAt: PGAPlatform.serverTimestamp()
          };
          if (row.year) {
            const registered = row.registered === null ? true : Boolean(row.registered);
            data.years = {
              [String(row.year)]: {
                registered,
                seed: registered && Boolean(row.seed),
                qualifierRank: registered && row.qualifierRank ? Number(row.qualifierRank) : null,
                updatedAt: PGAPlatform.serverTimestamp()
              }
            };
          }
          if (!exists) data.createdAt = PGAPlatform.serverTimestamp();
          batch.set(ref, data, { merge: true });
          pending += 1;
          imported += 1;
          if (pending >= 450) await commit();
        }
        await commit();
        PGAPlatform.showToast(`${imported}件をCSVインポートしました。`);
      } catch (error) {
        PGAPlatform.showToast('CSVインポートに失敗しました: ' + (error.message || error.code));
      } finally {
        $('csvFileInput').value = '';
      }
    }

    function bindEvents() {
      ['searchName', 'searchKana', 'searchAffiliation', 'searchQualification', 'searchStatus', 'displayEligibilityYear', 'searchRegistered', 'searchSeed', 'searchQualifierRankMin', 'searchQualifierRankMax'].forEach(id => {
        $(id)?.addEventListener('input', applyFilters);
        $(id)?.addEventListener('change', applyFilters);
      });
      $('resetSearchBtn').onclick = () => {
        ['searchName', 'searchKana', 'searchAffiliation', 'searchQualifierRankMin', 'searchQualifierRankMax'].forEach(id => { $(id).value = ''; });
        $('searchQualification').value = '';
        $('searchStatus').value = '';
        $('searchRegistered').value = '';
        $('searchSeed').value = '';
        applyFilters();
      };
      $('newPlayerBtn').onclick = () => openPlayerModal(null);
      $('cancelPlayerBtn').onclick = closePlayerModal;
      $('playerModal').addEventListener('click', event => {
        if (event.target === $('playerModal')) closePlayerModal();
      });
      $('playerForm').addEventListener('submit', savePlayer);
      $('playerQualificationYear').addEventListener('change', () => {
        const player = appState.players.find(item => item.id === appState.editingId) || {};
        loadPlayerYearEligibility(player);
      });
      $('playerRegistered').addEventListener('change', syncPlayerYearControls);
      $('exportCsvBtn').onclick = exportCsv;
      $('importCsvBtn').onclick = () => $('csvFileInput').click();
      $('csvFileInput').onchange = event => importCsv(event.target.files?.[0]);
      $('reloadPlayersBtn').onclick = () => {
        subscribePlayers();
        PGAPlatform.showToast('選手一覧を再読込しました。');
      };
      document.querySelectorAll('.sortHeader').forEach(button => {
        button.addEventListener('click', () => {
          const key = button.dataset.sortKey;
          appState.sort = {
            key,
            direction: appState.sort.key === key && appState.sort.direction === 'asc' ? 'desc' : 'asc'
          };
          applyFilters();
        });
      });
    }

    function initPlayersPage() {
      fillSelect($('searchQualification'), PGAPlatform.QUALIFICATIONS.filter(row => row.value), 'すべて');
      fillSelect($('searchStatus'), PGAPlatform.STATUSES, 'すべて');
      fillSelect($('playerQualification'), PGAPlatform.QUALIFICATIONS, null);
      fillSelect($('playerStatus'), PGAPlatform.STATUSES, null);
      fillYearSelect($('displayEligibilityYear'), new Date().getFullYear());
      bindEvents();
      subscribePlayers();
      PGAPlatform.bindLogoutButtons();
    }

    PGAPlatform.requireAuth({
      pageName: '選手マスター管理',
      onReady: initPlayersPage
    });
  </script>
</body>
</html>
