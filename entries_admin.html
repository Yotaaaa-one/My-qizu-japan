<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出場者管理 v17.0 Phase 3</title>
  <link rel="stylesheet" href="./platform-admin-v17.0.css">
</head>
<body class="platform-admin">
  <div class="adminShell">
    <aside class="adminSidebar">
      <div class="adminBrand">
        <strong>PGA Tournament Platform</strong>
        <span>v17.0 Phase 3</span>
      </div>
      <nav class="adminNav">
        <a href="./admin.html">管理トップ</a>
        <a href="./players_admin.html">選手マスター</a>
        <a href="./tournaments_admin.html">大会マスター</a>
        <a class="active" href="./entries_admin.html">出場者管理</a>
        <span class="disabledNav">スコア生成 <small>準備中</small></span>
      </nav>
    </aside>

    <main class="adminMain">
      <header class="adminTopbar">
        <div class="adminTitle">
          <h1>出場者管理</h1>
          <p>tournaments_master/{tournamentId}/entries/{playerId} を管理します。</p>
        </div>
        <div class="adminUser">
          <span data-auth-email>認証確認中</span>
          <span class="badge" data-auth-role>login</span>
          <button class="btn secondary" data-platform-logout>ログアウト</button>
        </div>
      </header>

      <section class="adminPanel">
        <div class="panelHeader">
          <h2>大会選択</h2>
          <span class="smallText" id="selectedTournamentMeta">大会を選択してください。</span>
        </div>
        <div class="formGrid three">
          <div class="field">
            <label for="tournamentSelect">大会</label>
            <select id="tournamentSelect"></select>
          </div>
          <div class="field">
            <label for="entrySearch">検索</label>
            <input id="entrySearch" type="search" placeholder="氏名・フリガナ・所属・組名">
          </div>
          <div class="field">
            <label for="entryStatusFilter">出場状態</label>
            <select id="entryStatusFilter"></select>
          </div>
          <div class="field">
            <label for="approvalStatusFilter">承認状態</label>
            <select id="approvalStatusFilter"></select>
          </div>
        </div>
      </section>

      <section class="adminPanel">
        <div class="panelHeader">
          <h2>選手マスターから追加</h2>
          <span class="smallText">players から出場者を追加します。</span>
        </div>
        <div class="formGrid three">
          <div class="field">
            <label for="playerSearch">選手検索</label>
            <input id="playerSearch" type="search" placeholder="氏名・フリガナ・所属">
          </div>
          <div class="field">
            <label for="playerSelect">選手</label>
            <select id="playerSelect"></select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="addEntryBtn" class="btn" type="button">出場者に追加</button>
          </div>
        </div>
      </section>

      <section class="adminPanel">
        <div class="toolbar">
          <div>
            <strong id="entryCountLabel">0件</strong>
            <span class="smallText" id="entryUpdatedLabel">読込待ち</span>
          </div>
          <div class="buttonRow">
            <button id="importEntriesCsvBtn" class="btn secondary">CSVインポート</button>
            <button id="exportEntriesCsvBtn" class="btn secondary">CSVエクスポート</button>
            <button id="reloadEntriesBtn" class="btn ghost">再読込</button>
            <input id="entriesCsvFileInput" class="hidden" type="file" accept=".csv,text/csv">
          </div>
        </div>
      </section>

      <section class="adminPanel">
        <div class="tableWrap">
          <table class="adminTable">
            <thead>
              <tr>
                <th>選手</th>
                <th>所属</th>
                <th>資格</th>
                <th>出場状態</th>
                <th>承認状態</th>
                <th>補欠順</th>
                <th>組番号</th>
                <th>組名</th>
                <th>スタートH</th>
                <th>スタート時間</th>
                <th>更新</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="entriesTableBody">
              <tr><td colspan="12" class="tableEmpty">大会選択後に読み込みます。</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="./platform-core-v17.0.js"></script>
  <script>
    const ENTRY_STATUSES = [
      { value: 'entered', label: '出場' },
      { value: 'withdrawn', label: '欠場' },
      { value: 'reserve', label: '補欠' }
    ];

    const APPROVAL_STATUSES = [
      { value: 'pending', label: '未承認' },
      { value: 'approved', label: '承認' },
      { value: 'rejected', label: '却下' }
    ];

    const SELECTED_TOURNAMENT_KEY = 'pga_platform_selected_tournament_v17';

    const appState = {
      tournaments: [],
      players: [],
      entries: [],
      filteredEntries: [],
      selectedTournamentId: '',
      entriesUnsubscribe: null,
      tournamentsUnsubscribe: null,
      playersUnsubscribe: null
    };

    const $ = id => document.getElementById(id);

    function labelOf(rows, value) {
      return rows.find(row => row.value === value)?.label || value || '未設定';
    }

    function fillSelect(select, rows, includeAllLabel) {
      if (!select) return;
      const options = includeAllLabel ? [{ value: '', label: includeAllLabel }, ...rows] : rows;
      select.innerHTML = options.map(row => `<option value="${PGAPlatform.escapeHtml(row.value)}">${PGAPlatform.escapeHtml(row.label)}</option>`).join('');
    }

    function selectedTournament() {
      return appState.tournaments.find(t => t.id === appState.selectedTournamentId) || null;
    }

    function entriesRef() {
      if (!appState.selectedTournamentId) return null;
      return PGAPlatform.db()
        .collection('tournaments_master')
        .doc(appState.selectedTournamentId)
        .collection('entries');
    }

    function renderTournamentSelect() {
      const select = $('tournamentSelect');
      if (!select) return;
      if (!appState.tournaments.length) {
        select.innerHTML = '<option value="">大会がありません</option>';
        appState.selectedTournamentId = '';
        $('selectedTournamentMeta').textContent = '大会マスターで大会を作成してください。';
        renderEntries();
        return;
      }
      const saved = localStorage.getItem(SELECTED_TOURNAMENT_KEY);
      if (!appState.selectedTournamentId) {
        appState.selectedTournamentId = appState.tournaments.some(t => t.id === saved) ? saved : appState.tournaments[0].id;
      }
      select.innerHTML = appState.tournaments.map(t => `<option value="${t.id}">${PGAPlatform.escapeHtml((t.year || '') + ' ' + (t.name || ''))}</option>`).join('');
      select.value = appState.selectedTournamentId;
      renderSelectedTournamentMeta();
    }

    function renderSelectedTournamentMeta() {
      const tournament = selectedTournament();
      if (!tournament) {
        $('selectedTournamentMeta').textContent = '大会を選択してください。';
        return;
      }
      const rounds = `${Number(tournament.roundCount || 1)}R`;
      const venue = tournament.venue || '-';
      const dates = tournament.startDate || tournament.endDate ? `${tournament.startDate || '-'} ～ ${tournament.endDate || '-'}` : '日程未設定';
      $('selectedTournamentMeta').textContent = `${venue} / ${rounds} / ${dates}`;
    }

    function subscribeTournaments() {
      if (appState.tournamentsUnsubscribe) appState.tournamentsUnsubscribe();
      appState.tournamentsUnsubscribe = PGAPlatform.db().collection('tournaments_master').onSnapshot(snapshot => {
        appState.tournaments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
          .sort((a, b) => Number(b.year || 0) - Number(a.year || 0) || String(a.name || '').localeCompare(String(b.name || ''), 'ja'));
        renderTournamentSelect();
        subscribeEntries();
      }, error => {
        console.error('[v17 entries] tournaments snapshot error', error);
        PGAPlatform.showToast('大会一覧の読み込みに失敗しました: ' + (error.message || error.code));
      });
    }

    function subscribePlayers() {
      if (appState.playersUnsubscribe) appState.playersUnsubscribe();
      appState.playersUnsubscribe = PGAPlatform.db().collection('players').onSnapshot(snapshot => {
        appState.players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
          .filter(player => player.status !== 'inactive' && player.status !== 'suspended')
          .sort((a, b) => String(a.kana || '').localeCompare(String(b.kana || ''), 'ja') || String(a.name || '').localeCompare(String(b.name || ''), 'ja'));
        renderPlayerSelect();
      }, error => {
        console.error('[v17 entries] players snapshot error', error);
        PGAPlatform.showToast('選手一覧の読み込みに失敗しました: ' + (error.message || error.code));
      });
    }

    function subscribeEntries() {
      if (appState.entriesUnsubscribe) appState.entriesUnsubscribe();
      const ref = entriesRef();
      if (!ref) {
        appState.entries = [];
        applyEntryFilters();
        return;
      }
      appState.entriesUnsubscribe = ref.onSnapshot(snapshot => {
        appState.entries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
          .sort((a, b) => {
            const groupDiff = Number(a.groupId || 9999) - Number(b.groupId || 9999);
            if (groupDiff !== 0) return groupDiff;
            const reserveDiff = Number(a.reserveOrder || 9999) - Number(b.reserveOrder || 9999);
            if (reserveDiff !== 0) return reserveDiff;
            return String(a.kana || a.playerName || '').localeCompare(String(b.kana || b.playerName || ''), 'ja');
          });
        applyEntryFilters();
        renderPlayerSelect();
      }, error => {
        console.error('[v17 entries] entries snapshot error', error);
        $('entriesTableBody').innerHTML = `<tr><td colspan="12" class="tableEmpty">読み込みエラー: ${PGAPlatform.escapeHtml(error.message || error.code)}</td></tr>`;
      });
    }

    function renderPlayerSelect() {
      const select = $('playerSelect');
      if (!select) return;
      const keyword = PGAPlatform.normalizeText($('playerSearch')?.value || '');
      const existing = new Set(appState.entries.map(entry => entry.playerId || entry.id));
      const rows = appState.players.filter(player => {
        if (existing.has(player.id)) return false;
        if (!keyword) return true;
        return [player.name, player.kana, player.affiliation].some(value => PGAPlatform.normalizeText(value).includes(keyword));
      }).slice(0, 250);
      if (!rows.length) {
        select.innerHTML = '<option value="">追加できる選手がありません</option>';
        return;
      }
      select.innerHTML = rows.map(player => `<option value="${player.id}">${PGAPlatform.escapeHtml(player.name || '')} / ${PGAPlatform.escapeHtml(player.affiliation || '')}</option>`).join('');
    }

    function collectFilters() {
      return {
        keyword: PGAPlatform.normalizeText($('entrySearch')?.value || ''),
        entryStatus: $('entryStatusFilter')?.value || '',
        approvalStatus: $('approvalStatusFilter')?.value || ''
      };
    }

    function applyEntryFilters() {
      const f = collectFilters();
      appState.filteredEntries = appState.entries.filter(entry => {
        if (f.entryStatus && entry.entryStatus !== f.entryStatus) return false;
        if (f.approvalStatus && entry.approvalStatus !== f.approvalStatus) return false;
        if (f.keyword) {
          const target = [entry.playerName, entry.kana, entry.affiliation, entry.groupName, entry.qualification].map(PGAPlatform.normalizeText).join(' ');
          if (!target.includes(f.keyword)) return false;
        }
        return true;
      });
      renderEntries();
    }

    function entryStatusClass(value) {
      if (value === 'withdrawn') return 'badge disabled';
      if (value === 'reserve') return 'badge pending';
      return 'badge';
    }

    function approvalStatusClass(value) {
      if (value === 'approved') return 'badge';
      if (value === 'rejected') return 'badge disabled';
      return 'badge pending';
    }

    function startHoleOptions(value) {
      return Array.from({ length: 18 }, (_, i) => i + 1)
        .map(hole => `<option value="${hole}" ${Number(value || 1) === hole ? 'selected' : ''}>${hole}H</option>`)
        .join('');
    }

    function renderEntries() {
      const body = $('entriesTableBody');
      if (!body) return;
      $('entryCountLabel').textContent = `${appState.filteredEntries.length}件 / 全${appState.entries.length}件`;
      $('entryUpdatedLabel').textContent = `更新 ${new Date().toLocaleTimeString('ja-JP', { hour12: false })}`;

      if (!appState.selectedTournamentId) {
        body.innerHTML = '<tr><td colspan="12" class="tableEmpty">大会を選択してください。</td></tr>';
        return;
      }

      if (!appState.filteredEntries.length) {
        body.innerHTML = '<tr><td colspan="12" class="tableEmpty">該当する出場者がいません。</td></tr>';
        return;
      }

      body.innerHTML = appState.filteredEntries.map(entry => `
        <tr>
          <td>
            <strong>${PGAPlatform.escapeHtml(entry.playerName || '')}</strong><br>
            <span class="smallText">${PGAPlatform.escapeHtml(entry.kana || '')}</span>
          </td>
          <td>${PGAPlatform.escapeHtml(entry.affiliation || '')}</td>
          <td>${PGAPlatform.escapeHtml(PGAPlatform.qualificationLabel(entry.qualification))}</td>
          <td>
            <select data-entry-status="${entry.id}">
              ${ENTRY_STATUSES.map(row => `<option value="${row.value}" ${row.value === entry.entryStatus ? 'selected' : ''}>${row.label}</option>`).join('')}
            </select>
          </td>
          <td>
            <select data-approval-status="${entry.id}">
              ${APPROVAL_STATUSES.map(row => `<option value="${row.value}" ${row.value === entry.approvalStatus ? 'selected' : ''}>${row.label}</option>`).join('')}
            </select>
          </td>
          <td><input data-reserve-order="${entry.id}" type="number" min="1" value="${entry.reserveOrder || ''}" style="width:78px;"></td>
          <td><input data-group-id="${entry.id}" type="number" min="1" value="${entry.groupId || ''}" style="width:78px;"></td>
          <td><input data-group-name="${entry.id}" value="${PGAPlatform.escapeHtml(entry.groupName || '')}" style="width:110px;"></td>
          <td><select data-start-hole="${entry.id}">${startHoleOptions(entry.startHole)}</select></td>
          <td><input data-planned-start="${entry.id}" type="time" value="${entry.plannedStart || ''}" style="width:100px;"></td>
          <td>${PGAPlatform.escapeHtml(PGAPlatform.formatDateTime(entry.updatedAt))}</td>
          <td>
            <div class="buttonRow">
              <button class="btn secondary" data-save-entry="${entry.id}">保存</button>
              <button class="btn ghost" data-approve-entry="${entry.id}">承認</button>
              <button class="btn secondary" data-reject-entry="${entry.id}">却下</button>
              <button class="btn warn" data-withdraw-entry="${entry.id}">欠場</button>
              <button class="btn ghost" data-reserve-entry="${entry.id}">補欠</button>
            </div>
          </td>
        </tr>
      `).join('');

      bindEntryRowButtons();
    }

    function rowInput(selector, id) {
      return Array.from(document.querySelectorAll(`[${selector}]`)).find(el => el.getAttribute(selector) === id);
    }

    function rowValue(selector, id) {
      return rowInput(selector, id)?.value || '';
    }

    function rowNumber(selector, id) {
      const value = rowValue(selector, id);
      return value === '' ? null : Number(value);
    }

    async function updateEntry(entryId, patch, message) {
      const ref = entriesRef();
      if (!ref) return;
      try {
        await ref.doc(entryId).set({
          ...patch,
          updatedAt: PGAPlatform.serverTimestamp()
        }, { merge: true });
        if (message) PGAPlatform.showToast(message);
      } catch (error) {
        PGAPlatform.showToast('保存に失敗しました: ' + (error.message || error.code));
      }
    }

    function saveEntryFromRow(entryId) {
      const entryStatus = rowValue('data-entry-status', entryId) || 'entered';
      const approvalStatus = rowValue('data-approval-status', entryId) || 'pending';
      updateEntry(entryId, {
        entryStatus,
        approvalStatus,
        reserveOrder: rowNumber('data-reserve-order', entryId),
        groupId: rowNumber('data-group-id', entryId),
        groupName: rowValue('data-group-name', entryId),
        startHole: Number(rowValue('data-start-hole', entryId) || 1),
        plannedStart: rowValue('data-planned-start', entryId)
      }, '出場者情報を保存しました。');
    }

    function bindEntryRowButtons() {
      document.querySelectorAll('[data-save-entry]').forEach(btn => {
        btn.onclick = () => saveEntryFromRow(btn.dataset.saveEntry);
      });
      document.querySelectorAll('[data-approve-entry]').forEach(btn => {
        btn.onclick = () => updateEntry(btn.dataset.approveEntry, { approvalStatus: 'approved', entryStatus: 'entered' }, '承認しました。');
      });
      document.querySelectorAll('[data-reject-entry]').forEach(btn => {
        btn.onclick = () => updateEntry(btn.dataset.rejectEntry, { approvalStatus: 'rejected' }, '却下しました。');
      });
      document.querySelectorAll('[data-withdraw-entry]').forEach(btn => {
        btn.onclick = () => updateEntry(btn.dataset.withdrawEntry, { entryStatus: 'withdrawn' }, '欠場にしました。');
      });
      document.querySelectorAll('[data-reserve-entry]').forEach(btn => {
        btn.onclick = () => updateEntry(btn.dataset.reserveEntry, { entryStatus: 'reserve', approvalStatus: 'pending' }, '補欠にしました。');
      });
    }

    async function addSelectedPlayer() {
      const ref = entriesRef();
      const playerId = $('playerSelect')?.value;
      if (!ref || !appState.selectedTournamentId) {
        PGAPlatform.showToast('大会を選択してください。');
        return;
      }
      if (!playerId) {
        PGAPlatform.showToast('追加する選手を選択してください。');
        return;
      }
      const player = appState.players.find(p => p.id === playerId);
      if (!player) return;
      const docRef = ref.doc(player.id);
      const exists = await docRef.get().then(snap => snap.exists).catch(() => false);
      const data = {
        playerId: player.id,
        playerName: player.name || '',
        kana: player.kana || '',
        affiliation: player.affiliation || '',
        qualification: player.qualification || '',
        entryStatus: 'entered',
        approvalStatus: 'pending',
        reserveOrder: null,
        groupId: null,
        groupName: '',
        startHole: 1,
        plannedStart: '',
        updatedAt: PGAPlatform.serverTimestamp()
      };
      if (!exists) data.entryAt = PGAPlatform.serverTimestamp();
      await docRef.set(data, { merge: true });
      PGAPlatform.showToast('出場者に追加しました。');
    }

    function first(record, keys) {
      for (const key of keys) {
        if (record[key] != null && String(record[key]).trim() !== '') return String(record[key]).trim();
      }
      return '';
    }

    function normalizeEntryRecord(record) {
      const player = PGAPlatform.normalizePlayerRecord(record);
      return {
        playerId: player.playerId,
        playerName: first(record, ['playerName', 'name', '氏名', '名前']) || player.name,
        kana: player.kana,
        affiliation: player.affiliation,
        qualification: player.qualification,
        entryStatus: first(record, ['entryStatus', '出場状態']) || 'entered',
        approvalStatus: first(record, ['approvalStatus', '承認状態']) || 'pending',
        reserveOrder: first(record, ['reserveOrder', '補欠順']),
        groupId: first(record, ['groupId', '組番号']),
        groupName: first(record, ['groupName', '組名']),
        startHole: first(record, ['startHole', 'スタートH', 'スタートホール']),
        plannedStart: first(record, ['plannedStart', 'スタート時間'])
      };
    }

    async function importEntriesCsv(file) {
      const ref = entriesRef();
      if (!ref) {
        PGAPlatform.showToast('大会を選択してください。');
        return;
      }
      if (!file) return;
      try {
        const text = await PGAPlatform.readFileAsText(file);
        const records = PGAPlatform.csvToObjects(text).map(normalizeEntryRecord).filter(row => row.playerName || row.playerId);
        if (!records.length) {
          PGAPlatform.showToast('取り込める出場者データがありません。');
          return;
        }

        let batch = PGAPlatform.db().batch();
        let pending = 0;
        let imported = 0;
        const commit = async () => {
          if (!pending) return;
          await batch.commit();
          batch = PGAPlatform.db().batch();
          pending = 0;
        };

        for (const row of records) {
          const master = row.playerId ? appState.players.find(p => p.id === row.playerId) : appState.players.find(p => p.name === row.playerName);
          const targetId = row.playerId || master?.id || '';
          const docRef = targetId ? ref.doc(targetId) : ref.doc();
          const playerId = targetId || docRef.id;
          const data = {
            playerId,
            playerName: row.playerName || master?.name || '',
            kana: row.kana || master?.kana || '',
            affiliation: row.affiliation || master?.affiliation || '',
            qualification: row.qualification || master?.qualification || '',
            entryStatus: row.entryStatus || 'entered',
            approvalStatus: row.approvalStatus || 'pending',
            reserveOrder: row.reserveOrder ? Number(row.reserveOrder) : null,
            groupId: row.groupId ? Number(row.groupId) : null,
            groupName: row.groupName || '',
            startHole: row.startHole ? Number(row.startHole) : 1,
            plannedStart: row.plannedStart || '',
            entryAt: PGAPlatform.serverTimestamp(),
            updatedAt: PGAPlatform.serverTimestamp()
          };
          batch.set(docRef, data, { merge: true });
          pending += 1;
          imported += 1;
          if (pending >= 450) await commit();
        }
        await commit();
        PGAPlatform.showToast(`${imported}件をCSVインポートしました。`);
      } catch (error) {
        PGAPlatform.showToast('CSVインポートに失敗しました: ' + (error.message || error.code));
      } finally {
        $('entriesCsvFileInput').value = '';
      }
    }

    function exportEntriesCsv() {
      const rows = appState.filteredEntries.map(entry => ({
        playerId: entry.playerId || entry.id,
        playerName: entry.playerName || '',
        kana: entry.kana || '',
        affiliation: entry.affiliation || '',
        qualification: entry.qualification || '',
        entryStatus: entry.entryStatus || '',
        approvalStatus: entry.approvalStatus || '',
        reserveOrder: entry.reserveOrder || '',
        groupId: entry.groupId || '',
        groupName: entry.groupName || '',
        startHole: entry.startHole || '',
        plannedStart: entry.plannedStart || '',
        entryAt: PGAPlatform.formatDateTime(entry.entryAt),
        updatedAt: PGAPlatform.formatDateTime(entry.updatedAt)
      }));
      const tournament = selectedTournament();
      const name = String(tournament?.name || 'entries').replace(/[\\/:*?"<>|]/g, '_');
      PGAPlatform.downloadText(`entries_${name}.csv`, PGAPlatform.objectsToCsv(rows, [
        'playerId','playerName','kana','affiliation','qualification','entryStatus','approvalStatus','reserveOrder','groupId','groupName','startHole','plannedStart','entryAt','updatedAt'
      ]), 'text/csv;charset=utf-8');
      PGAPlatform.showToast('CSVを書き出しました。');
    }

    function bindEvents() {
      fillSelect($('entryStatusFilter'), ENTRY_STATUSES, 'すべて');
      fillSelect($('approvalStatusFilter'), APPROVAL_STATUSES, 'すべて');

      $('tournamentSelect').addEventListener('change', () => {
        appState.selectedTournamentId = $('tournamentSelect').value;
        localStorage.setItem(SELECTED_TOURNAMENT_KEY, appState.selectedTournamentId);
        renderSelectedTournamentMeta();
        subscribeEntries();
      });
      ['entrySearch', 'entryStatusFilter', 'approvalStatusFilter'].forEach(id => {
        $(id).addEventListener('input', applyEntryFilters);
        $(id).addEventListener('change', applyEntryFilters);
      });
      $('playerSearch').addEventListener('input', renderPlayerSelect);
      $('addEntryBtn').onclick = addSelectedPlayer;
      $('reloadEntriesBtn').onclick = () => {
        subscribeEntries();
        PGAPlatform.showToast('出場者一覧を再読込しました。');
      };
      $('importEntriesCsvBtn').onclick = () => $('entriesCsvFileInput').click();
      $('entriesCsvFileInput').onchange = event => importEntriesCsv(event.target.files?.[0]);
      $('exportEntriesCsvBtn').onclick = exportEntriesCsv;
    }

    function initEntriesPage() {
      bindEvents();
      subscribeTournaments();
      subscribePlayers();
      PGAPlatform.bindLogoutButtons();
    }

    PGAPlatform.requireAuth({
      pageName: '出場者管理',
      onReady: initEntriesPage
    });
  </script>
</body>
</html>
